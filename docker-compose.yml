services:
  api:
    image: python:3.12-slim
    working_dir: /app/apps/api
    command: >
      bash -lc "pip install --no-cache-dir -r requirements.txt &&
      uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./:/app
    ports:
      - "8000:8000"

  # Optional reverse proxy placeholder for later
